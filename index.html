<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wortschatz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 id="mainTitle">Wortschatz</h1>
        <h1 id="topSessionTimer" class="hidden">00:00</h1>

        <div id="setupScreen" class="screen">
            <div class="setup-controls">
                <button class="diff-btn" data-val="150">Easy</button>
                <button class="diff-btn active" data-val="300">Medium</button>
                <button class="diff-btn" data-val="600">Hard</button>
                <button class="diff-btn" data-val="infinite">Endless</button>
            </div>
            <button id="startButton" class="action-btn">START</button>
        </div>

        <div id="gameScreen" class="screen hidden">
            <div class="slots">
                <div class="slot-container">
                    <div id="wordSlot" class="slot">
                        <div id="wordTimerValue" class="bg-timer hidden">10</div>
                        <div id="wordText" class="word-text">?</div>
                    </div>
                </div>
            </div>

            <div id="optionsContainer" class="options-grid"></div>
            
            <div>
                <button id="stopButton" class="action-btn stop-btn">STOP</button>
            </div>
        </div>

        <div id="resultsScreen" class="screen hidden">
            <div class="results-box">
                <div class="accuracy-display">
                    <div id="accuracyPercent" class="accuracy-number acc-default">0%</div>
                    <div class="accuracy-label">Accuracy</div>
                </div>
            </div>
            <button id="restartButton" class="action-btn">DONE</button>
        </div>
    </div>
    
    <script src="words.js"></script>
    <script src="script.js"></script>
</body>
</html>
