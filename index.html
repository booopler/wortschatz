<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wortschatz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 id="mainTitle">Wortschatz</h1>
        
        <div id="headerContainer" class="header-container hidden">
            <div class="timer-streak-row">
                <h1 id="topSessionTimer">00:00</h1>
                
                <div id="streakMeterWrapper" class="streak-wrapper">
                    <div id="streakMeter" class="streak-pill">x1</div>
                </div>
            </div>
        </div>

        <div id="setupScreen" class="screen">
            <div class="setup-controls">
                <button class="diff-btn easy-btn" data-val="150">Easy</button>
                <button class="diff-btn medium-btn active" data-val="300">Medium</button>
                <button class="diff-btn hard-btn" data-val="600">Hard</button>
                <button class="diff-btn endless-btn" data-val="infinite">???</button>
            </div>
            <button id="startButton" class="action-btn">START</button>
        </div>

        <div id="gameScreen" class="screen hidden">
            <div id="healthBarWrapper" class="health-bar-wrapper">
                <div id="glyphSegmentsContainer" class="glyph-segments-container"></div>
            </div>

            <div class="slots">
                <div class="slot-container">
                    <div id="wordSlot" class="slot">
                        <div id="wordTimerValue" class="bg-timer hidden">10</div>
                        <div id="wordText" class="word-text">?</div>
                    </div>
                </div>
            </div>
            
            <div id="optionsContainer" class="options-grid"></div>
            
            <div class="action-row">
                <button id="stopButton" class="action-btn stop-btn">STOP</button>
                <button id="finishButton" class="action-btn side-btn check-btn">✓</button>
            </div>
        </div>

        <div id="resultsScreen" class="screen hidden">
            <div class="results-box">
                <div class="accuracy-score-container">
                    <div class="accuracy-display">
                        <div id="accuracyPercent" class="accuracy-number acc-default">0%</div>
                        <div class="accuracy-label">Accuracy</div>
                    </div>
                    <div class="divider"></div>
                    <div class="score-display">
                        <div id="finalScore" class="score-number acc-default">0</div>
                        <div class="accuracy-label">Score</div>
                    </div>
                </div>
            </div>
            
            <div class="collapsible-wrapper" id="resultsCollapsible">
                <button id="accordionToggle" class="accordion-header">
                    <span>More Results</span>
                    <span class="chevron">▼</span>
                </button>
                <div id="accordionContent" class="accordion-content">
                    <div class="stats-list">
                        <div>Time Elapsed: <span id="statTimeElapsed">0.00s</span></div>
                        <div>Highest Streak: <span id="statStreaks">0</span></div>
                        <div>Fastest Guessed: <span id="statFastest">?</span></div>
                        <div>Slowest Guessed: <span id="statSlowest">?</span></div>
                        <div>Total Guessed: <span id="statTotal">0</span></div>
                    </div>
                </div>
            </div>

            <div id="leaderboardArea" class="leaderboard-container">
                <h3 class="leaderboard-title">LEADERBOARDS</h3>
                <div id="leaderboardList" class="leaderboard-list">Loading...</div>
                <button id="submitScoreBtn" class="stretched-action-btn action-submit">SUBMIT</button>
            </div>

            <div class="action-row">
                <button id="restartButton" class="action-btn">DONE</button>
                <button id="replayButton" class="action-btn side-btn replay-btn">↻</button>
            </div>
        </div>
    </div>

    <div id="nameModal" class="modal">
        <div class="modal-content">
            <h2>Enter Name</h2>
            <input type="text" id="playerName" maxlength="3" autocomplete="off" placeholder="AAA">
            <button id="saveScoreBtn" class="stretched-action-btn action-save">SAVE</button>
            <button id="closeModalBtn" class="stretched-action-btn action-cancel">CANCEL</button>
        </div>
    </div>
    
    <script src="words.js"></script>
    <script src="script.js"></script>
</body>
</html>
